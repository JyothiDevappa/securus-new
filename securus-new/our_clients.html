<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Our Partners</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fff;
      color: #00316d;
    }

    .header-strip {
      width: 100%;
      height: 50px;
      background-color: #00316d;
    }

    .main-content {
      padding: 40px 20px;
      text-align: center;
    }

    .title {
      font-size: 32px;
      margin-bottom: 30px;
    }

    .partners-section {
      background-color: #f9f9f9;
      padding: 20px;
    }

    .partners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 70px;
      justify-items: center;
      align-items: center;
    }

    .partners-grid img {
      max-width: 170px;
      height: auto;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .partners-grid img:hover {
      transform: scale(1.1);
    }

    .footer {
      background-color: #00316d;
      color: white;
      padding: 30px 20px;
    }

    .footer-columns {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .column {
      flex: 1 1 100px;
      padding: 10px;
    }

    .footer-logo {
      max-width: 150px;
    }

    .contact-details {
      list-style: none;
      padding: 0;
      font-size: 14px;
    }

    .contact-details li {
      margin-bottom: 10px;
    }

    a {
      color: #ffffff;
      text-decoration: underline;
    }

    a:hover {
      text-decoration: none;
    }

  
  </style>
</head>
<body>


  <!-- Main Content -->
  <main class="main-content">
    <h2 class="title">Our Partners</h2>

    <section class="partners-section">
      <div class="partners-grid">
        <img src="../securus-new/images/brand/1.jpg" alt="Partner 1">
        <img src="../securus-new/images/brand/2.jpg" alt="Partner 2">
        <img src="../securus-new/images/brand/3.jpg" alt="Partner 3">
        <img src="../securus-new/images/brand/4.jpg" alt="Partner 4">
        <img src="../securus-new/images/brand/5.jpg" alt="Partner 5">
        <img src="../securus-new/images/brand/6.jpg" alt="Partner 6">
        <img src="../securus-new/images/brand/7.jpg" alt="Partner 7">
        <img src="../securus-new/images/brand/8.jpg" alt="Partner 8">
        <img src="../securus-new/images/brand/9.jpg" alt="Partner 9">
        <img src="../securus-new/images/brand/10.jpg" alt="Partner 10">
        <img src="../securus-new/images/brand/11.jpg" alt="Partner 11">
        <img src="../securus-new/images/brand/12.jpg" alt="Partner 12">
        <img src="../securus-new/images/brand/13.jpg" alt="Partner 13">
        <img src="../securus-new/images/brand/14.jpg" alt="Partner 14">
        <img src="../securus-new/images/brand/15.jpg" alt="Partner 15">
        <img src="../securus-new/images/brand/16.jpg" alt="Partner 16">
        <img src="../securus-new/images/brand/17.jpg" alt="Partner 17">
        <img src="../securus-new/images/brand/18.jpg" alt="Partner 18">
        <img src="../securus-new/images/brand/19.jpg" alt="Partner 19">
        <img src="../securus-new/images/brand/20.jpg" alt="Partner 20">
        <img src="../securus-new/images/brand/21.jpg" alt="Partner 21">
        <img src="../securus-new/images/brand/22.jpg" alt="Partner 22">
        <img src="../securus-new/images/brand/23.jpg" alt="Partner 23">
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-columns">
      <div class="column">
        <img src="securus.png" alt="Logo" class="footer-logo">
      </div>
      <div class="column">
        <h3>Get in Touch</h3>
        <ul class="contact-details">
          <li><strong>Phone:</strong> +65 6899 3088</li>
          <li><strong>Fax:</strong> +65 6899 9318</li>
          <li><strong>Email:</strong> <a href="mailto:info@securus.com.sg">info@securus.com.sg</a></li>
          <li><strong>Address:</strong> 130 Jurong Gateway Road #04-221, Singapore 600130</li>
        </ul>
      </div>
    </div>
  
  </footer>

</body>
</html>
